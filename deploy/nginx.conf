server {
    listen 80;
    server_name isofthub.com www.isofthub.com; # ALAN ADINIZLA DEĞİŞTİRİN

    # Log Dosyaları
    access_log /var/log/nginx/isofthub_access.log;
    error_log /var/log/nginx/isofthub_error.log;

    # Frontend (React/Vite Statik Dosyaları)
    location / {
        # 'npm run build' sonrası oluşan 'dist' klasörünün tam yolu
        root /var/www/isofthub/frontend/dist; 
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Yönlendirmesi (Node.js)
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket Yönlendirmesi (Node.js)
    location /monitoring/realtime {
        proxy_pass http://localhost:5000; # Node.js WS sunucusu 5000 portunu paylaşıyor
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 80;
    server_name tree.isofthub.com; # FİZİKSEL AĞAÇ İÇİN ALT ALAN ADI (SUBDOMAIN)

    # .NET API Yönlendirmesi
    location / {
        proxy_pass http://localhost:5050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
