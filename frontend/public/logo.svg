<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 105">
  <defs>
    <clipPath id="clip">
      <rect width="200" height="105" rx="8"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <!-- Light blue background -->
    <rect width="200" height="105" fill="#ccd9eb"/>
    <!-- Black left panel ~28% -->
    <rect width="56" height="105" fill="#000"/>
    <!-- Play button triangle (filled white) -->
    <polygon points="18,32 18,73 48,52.5" fill="white"/>
    <!-- "isoft" text -->
    <text x="66" y="80" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="60" font-weight="900" fill="#111" letter-spacing="-2">isoft</text>
  </g>
</svg>
