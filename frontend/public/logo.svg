<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <defs>
    <clipPath id="clip">
      <rect width="560" height="120" rx="10"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <!-- Light blue background -->
    <rect width="560" height="120" fill="#c9d8ed"/>
    <!-- Black left panel -->
    <rect width="130" height="120" fill="#000"/>
    <!-- Chevron > on black panel -->
    <path d="M38 28 L90 60 L38 92" stroke="#c9d8ed" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- stem of i -->
    <rect x="152" y="38" width="16" height="52" rx="2" fill="#111"/>
    <!-- cursor square above i -->
    <rect x="152" y="18" width="16" height="14" rx="2" fill="#111"/>
    <!-- soft -->
    <text x="175" y="90" font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="900" fill="#111" letter-spacing="-1">soft</text>
    <!-- sparkle -->
    <g transform="translate(544,108)" fill="white" opacity="0.75">
      <polygon points="0,-5 1.2,-1.2 5,0 1.2,1.2 0,5 -1.2,1.2 -5,0 -1.2,-1.2"/>
    </g>
  </g>
</svg>
