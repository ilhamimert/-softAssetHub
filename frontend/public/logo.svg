<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 206" width="400" height="206">
  <defs>
    <clipPath id="clip">
      <rect width="400" height="206" rx="14"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <!-- Light blue/periwinkle background -->
    <rect width="400" height="206" fill="#c9d8ed"/>
    <!-- Black left panel -->
    <rect width="110" height="206" fill="#000"/>
    <!-- Chevron > on black panel -->
    <path d="M30 58 L74 103 L30 148" stroke="#c9d8ed" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- "isoft" text — custom "i" with cursor square instead of dot -->
    <!-- Manually draw i: vertical bar + cursor square (no circle dot) -->
    <!-- stem of i -->
    <rect x="125" y="74" width="18" height="80" rx="2" fill="#111"/>
    <!-- cursor square above i (replaces dot) -->
    <rect x="125" y="42" width="18" height="20" rx="2" fill="#111"/>
    <!-- soft -->
    <text x="150" y="154" font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif" font-size="108" font-weight="900" fill="#111" letter-spacing="-2">soft</text>
    <!-- Small sparkle star bottom-right -->
    <g transform="translate(381,192)" fill="white" opacity="0.75">
      <polygon points="0,-6 1.5,-1.5 6,0 1.5,1.5 0,6 -1.5,1.5 -6,0 -1.5,-1.5"/>
    </g>
  </g>
</svg>
