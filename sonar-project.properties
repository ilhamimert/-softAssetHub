# SonarCloud — Proje Yapılandırması
# https://sonarcloud.io

# Python sürümü (_deploy_ssh.py için)
sonar.python.version=3.9

# Demo / migration seed dosyalarını güvenlik taramasından hariç tut
# Bu dosyalar üretim kodu değil, geliştirme ortamı demo verisidir.
sonar.security.exclusions=\
  backend/database/seed.sql,\
  backend/database/migrations/002_pg_seed.sql,\
  backend/database/migrations/007_buildings_rooms_seed.sql

# Test ve migration dosyaları için reliability/maintainability taramasını gevşet
sonar.coverage.exclusions=\
  backend/database/**,\
  backend/scripts/**
